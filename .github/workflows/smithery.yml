name: Publish to Smithery

on:
  workflow_dispatch:

env:
  # Suppress Node.js deprecation warnings in GitHub Actions
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: |
          npm install
          # Pre-install esbuild to prevent CLI interactive prompts from hanging the CI
          npm install -D esbuild@^0.27.0

      - name: Publish to Smithery Registry
        env:
          SMITHERY_TOKEN: ${{ secrets.SMITHERY_TOKEN }}
        # Automate the interactive CLI prompt by piping the server name "agent-commerce-os"
        run: echo "agent-commerce-os" | npx @smithery/cli@latest publish
